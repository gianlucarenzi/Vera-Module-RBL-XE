[env]
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

; -----------------------------------------------------------------------
; NodeMCU DevKit V1 (ESP32-WROOM-32 / PICO-D4) -- PBI mode
; -----------------------------------------------------------------------
[env:nodemcu-pbi]
platform          = espressif32@6.6.0
board             = nodemcu-32s
board_build.f_cpu = 240000000
build_flags =
    -O3
    -Wno-shift-count-overflow
    -D USE_ESP32_REGISTER_ACCESS
    -D MCU_ESP32_CLASSIC
    -D BUS_MODE=0
    -I include

; -----------------------------------------------------------------------
; NodeMCU DevKit V1 (ESP32-WROOM-32 / PICO-D4) -- CCTL mode
; -----------------------------------------------------------------------
[env:nodemcu-cctl]
platform          = espressif32@6.6.0
board             = nodemcu-32s
board_build.f_cpu = 240000000
build_flags =
    -O3
    -Wno-shift-count-overflow
    -D USE_ESP32_REGISTER_ACCESS
    -D MCU_ESP32_CLASSIC
    -D BUS_MODE=1
    -I include

; -----------------------------------------------------------------------
; ESP32-S3FN8 (QFN56, 8 MB Quad SPI flash, LX7) -- PBI mode
; -----------------------------------------------------------------------
[env:esp32s3fn8-pbi]
platform                 = espressif32@6.6.0
board                    = esp32-s3-devkitc-1
board_build.f_cpu        = 240000000L
board_build.flash_mode   = qio
board_build.flash_size   = 8MB
build_flags =
    -O3
    -Wno-shift-count-overflow
    -D USE_ESP32_REGISTER_ACCESS
    -D MCU_ESP32_S3
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D BUS_MODE=0
    -I include

; -----------------------------------------------------------------------
; ESP32-S3FN8 (QFN56, 8 MB Quad SPI flash, LX7) -- CCTL mode
; -----------------------------------------------------------------------
[env:esp32s3fn8-cctl]
platform                 = espressif32@6.6.0
board                    = esp32-s3-devkitc-1
board_build.f_cpu        = 240000000L
board_build.flash_mode   = qio
board_build.flash_size   = 8MB
build_flags =
    -O3
    -Wno-shift-count-overflow
    -D USE_ESP32_REGISTER_ACCESS
    -D MCU_ESP32_S3
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D BUS_MODE=1
    -I include
