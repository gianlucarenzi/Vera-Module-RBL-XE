[env]
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
extra_scripts = pre:pre_build_6502.py
default_envs  = esp32s3fn8, esp32s3fn8-cctl

; -----------------------------------------------------------------------
; ESP32-S3FN8 (QFN56, 8 MB Quad SPI flash, LX7) — common settings
; -----------------------------------------------------------------------
[esp32s3fn8_base]
platform                 = espressif32@6.6.0
board                    = esp32-s3-devkitc-1
board_build.f_cpu        = 240000000L
board_build.flash_mode   = qio
board_build.flash_size   = 8MB
build_flags =
    -O3
    -Wno-shift-count-overflow
    -D USE_ESP32_REGISTER_ACCESS
    -D USE_DEDICATED_GPIO
    -D MCU_ESP32_S3
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -I include

; PBI mode: latch at $D1FF, VERA regs at $D100-$D11F
[env:esp32s3fn8]
extends     = esp32s3fn8_base
build_flags = ${esp32s3fn8_base.build_flags}
    -D VERA_BOARD_IS_PBI=1

; CCTL mode: latch at $D5FF, DEV_SEL_N for cartridge slot
[env:esp32s3fn8-cctl]
extends     = esp32s3fn8_base
build_flags = ${esp32s3fn8_base.build_flags}
    -D VERA_BOARD_IS_PBI=0
