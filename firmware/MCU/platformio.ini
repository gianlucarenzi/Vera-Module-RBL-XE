[env]
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
extra_scripts = pre:pre_build_6502.py

; -----------------------------------------------------------------------
; ESP32-S3FN8 (QFN56, 8 MB Quad SPI flash, LX7)
; Unified firmware: PBI ($D1xx) + CCTL ($D5xx) decoded at runtime
; -----------------------------------------------------------------------
[env:esp32s3fn8]
platform                 = espressif32@6.6.0
board                    = esp32-s3-devkitc-1
board_build.f_cpu        = 240000000L
board_build.flash_mode   = qio
board_build.flash_size   = 8MB
build_flags =
    -O3
    -Wno-shift-count-overflow
    -D USE_ESP32_REGISTER_ACCESS
    -D USE_DEDICATED_GPIO
    -D MCU_ESP32_S3
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -I include
